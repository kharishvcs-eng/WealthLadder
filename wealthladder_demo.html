<style>
:root{--bg:#060810;--bg2:#0a0e1a;--bg3:#0f1422;--card:#111826;--border:rgba(255,255,255,.055);--buy:#00d991;--sell:#ff3d5a;--open:#ffb300;--accent:#4f8dff;--text:#d4dff7;--muted:#4a5670;--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.top{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg2);flex-shrink:0;flex-wrap:wrap;gap:6px}
.brand{font-family:var(--mono);font-size:15px;font-weight:700}.brand em{color:var(--buy);font-style:normal}
.scr{flex:1;overflow-y:auto;padding:28px 36px;scroll-behavior:smooth}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(0,217,145,.2)}50%{box-shadow:0 0 25px rgba(0,217,145,.4)}}
.anim{animation:fu .6s ease forwards;opacity:0}
.anim-d1{animation-delay:.1s}.anim-d2{animation-delay:.2s}.anim-d3{animation-delay:.3s}.anim-d4{animation-delay:.4s}.anim-d5{animation-delay:.5s}.anim-d6{animation-delay:.6s}.anim-d7{animation-delay:.7s}.anim-d8{animation-delay:.8s}
.narr{background:rgba(79,141,255,.04);border:.5px solid rgba(79,141,255,.12);border-radius:12px;padding:16px 22px;margin-bottom:18px;font-size:14px;line-height:2;color:#85B7EB}
.kpi-s{display:flex;gap:0;border:.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.kpi{padding:12px 16px;border-right:.5px solid var(--border);flex:1;text-align:center}.kpi:last-child{border-right:none}
.kl{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.kv{font-family:var(--mono);font-size:16px;font-weight:700}
.sig{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 18px;margin:10px 0}
.badge{display:inline-flex;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600}
.bb{background:rgba(0,217,145,.12);color:var(--buy)}.bs{background:rgba(255,61,90,.12);color:var(--sell)}.bi{background:rgba(79,141,255,.12);color:var(--accent)}
.ba{background:rgba(0,217,145,.15);color:var(--buy);border:.5px solid rgba(0,217,145,.3)}
.bw{background:rgba(79,141,255,.12);color:#85B7EB;border:.5px solid rgba(79,141,255,.2)}
.bc{background:rgba(255,255,255,.06);color:var(--muted);border:.5px solid rgba(255,255,255,.1)}
.mo{font-family:var(--mono);font-size:12px}
.ok{background:rgba(0,217,145,.04);border:.5px solid rgba(0,217,145,.15);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--buy);margin-top:12px}
.wn{background:rgba(255,179,0,.05);border:.5px solid rgba(255,179,0,.18);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--open);margin-top:12px}
.dn{background:rgba(255,61,90,.05);border:.5px solid rgba(255,61,90,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--sell);margin-top:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}.tbl th{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);background:rgba(0,0,0,.3)}.tbl td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.02)}
.page-tag{display:inline-flex;padding:3px 12px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.08em;background:rgba(79,141,255,.08);color:var(--accent);border:.5px solid rgba(79,141,255,.15);margin-bottom:12px}
.part-tag{display:inline-flex;padding:2px 10px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.pt-edu{background:rgba(255,179,0,.1);color:var(--open);border:.5px solid rgba(255,179,0,.2)}
.pt-app{background:rgba(0,217,145,.1);color:var(--buy);border:.5px solid rgba(0,217,145,.2)}
.pt-adv{background:rgba(79,141,255,.1);color:var(--accent);border:.5px solid rgba(79,141,255,.2)}
.ti{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;text-align:center}
.ti h1{font-size:42px;font-weight:900;letter-spacing:3px;margin-bottom:8px}
.ti h1 em{color:var(--buy);font-style:normal}
.ti .tg{font-size:12px;color:var(--muted);letter-spacing:5px;margin-bottom:24px}
.chip{padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500;border:.5px solid}
.cg{background:rgba(0,217,145,.08);color:var(--buy);border-color:rgba(0,217,145,.2)}
.cb2{background:rgba(79,141,255,.08);color:var(--accent);border-color:rgba(79,141,255,.2)}
.cr{background:rgba(255,61,90,.08);color:var(--sell);border-color:rgba(255,61,90,.2)}
.co{background:rgba(255,179,0,.08);color:var(--open);border-color:rgba(255,179,0,.2)}
.dbox{border-radius:10px;padding:14px 18px;text-align:center;font-size:12px;line-height:1.7}
.db-g{background:rgba(0,217,145,.06);border:.5px solid rgba(0,217,145,.2);color:var(--buy)}
.db-r{background:rgba(255,61,90,.06);border:.5px solid rgba(255,61,90,.2);color:var(--sell)}
.db-b{background:rgba(79,141,255,.06);border:.5px solid rgba(79,141,255,.2);color:var(--accent)}
.db-o{background:rgba(255,179,0,.06);border:.5px solid rgba(255,179,0,.2);color:var(--open)}
.db-d{background:var(--bg3);border:.5px solid var(--border);color:var(--text)}
.arrow{text-align:center;font-size:18px;color:var(--muted);padding:6px 0}
.pos{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:8px;margin:6px 0}
.pos.fg{background:rgba(0,217,145,.08);border:.5px solid rgba(0,217,145,.15)}
.prog{height:3px;background:rgba(79,141,255,.1);border-radius:2px;overflow:hidden}.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.ctrls{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 16px;border-top:1px solid rgba(255,255,255,.06);background:var(--bg2);flex-shrink:0;position:relative;z-index:50}
.cb{padding:10px 22px;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;min-height:44px;transition:all .15s}.cb:disabled{opacity:.3;cursor:not-allowed}
.cp{background:rgba(255,255,255,.06);color:var(--text)}.cn{background:var(--accent);color:#fff}
.gr{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:12px}
.gd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}.gp{background:var(--buy);color:#000}.gf{background:var(--sell);color:#fff}
.sb{display:flex;border-radius:6px;overflow:hidden;height:30px;margin-bottom:14px}
.ss{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#000}.ss.ac{outline:2px solid #fff;outline-offset:-2px;z-index:1}
@media(max-width:640px){.top{padding:8px 12px}.scr{padding:16px 14px;padding-bottom:80px}.ctrls{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;gap:10px;z-index:100}.cb{padding:14px 28px;font-size:16px;min-height:50px;flex:1}.kpi-s{flex-wrap:wrap}.kpi{min-width:45%;flex:1 1 45%}.ti h1{font-size:28px}.ti{min-height:300px}}

<body>
<div class="app">
<div class="top">
  <div class="brand">WEALTH<em>.</em>LADDER <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:8px;">v10 Demo</span></div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="vOn" checked> Voice</label>
    <select id="vSel" style="background:var(--bg3);color:var(--text);border:.5px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;max-width:200px"><option>Loading...</option></select>
    <label style="font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px"><span>Speed</span><input type="range" id="vSpd" min="0.6" max="1.4" step="0.05" value="0.95" style="width:60px;accent-color:var(--buy)"><span id="vSpdLbl" style="font-size:10px">0.95</span></label>
    <button onclick="spk('WealthLadder. Climb smarter, trade better.')" style="background:var(--bg3);border:.5px solid var(--border);border-radius:4px;padding:3px 10px;font-size:10px;color:var(--accent);cursor:pointer">Test</button>
    <span style="font-family:var(--mono);font-size:12px;color:var(--muted)" id="clk"></span>
  </div>
</div>
<div style="flex:1;overflow:hidden;min-height:0"><div class="scr" id="scr"></div></div>
<div class="ctrls">
  <div class="prog" style="position:absolute;top:0;left:0;right:0;"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <span style="font-family:var(--mono);font-size:12px;color:var(--muted);min-width:50px;text-align:center" id="sl">1/32</span>
  <button class="cb cp" id="bp" onclick="P()">&#8592; Prev</button>
  <button class="cb cn" id="bn" onclick="N()">Next &#8594;</button>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
let aOk=false;async function aI(){if(aOk)return;try{await Tone.start();aOk=true}catch(e){}}
function sn(t){if(!aOk)return;try{
if(t==='intro')['C4','E4','G4','C5'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.05,decay:.3,sustain:.1,release:.3}}).toDestination().triggerAttackRelease(n,'8n'),i*150));
if(t==='scan')new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.05,decay:.3,sustain:0,release:.2},volume:-8}).toDestination().triggerAttackRelease('D5','8n');
if(t==='buy')['C5','E5','G5'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.15,sustain:0,release:.1}}).toDestination().triggerAttackRelease(n,'8n'),i*100));
if(t==='win')['C5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.2,sustain:.1,release:.2}}).toDestination().triggerAttackRelease(n,'8n'),i*120));
if(t==='gamma')['C5','E5','G5','B5','C6','E6'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.15,sustain:.15,release:.2}}).toDestination().triggerAttackRelease(n,'16n'),i*80));
if(t==='blocked')['C4','C4','Ab3'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.1,sustain:0,release:.05},volume:-15}).toDestination().triggerAttackRelease(n,'16n'),i*150));
if(t==='chime')new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.02,decay:.4,sustain:0,release:.3},volume:-10}).toDestination().triggerAttackRelease('E5','8n');
}catch(e){}}
function _loadVoices(){const sel=document.getElementById('vSel');const v=window.speechSynthesis.getVoices();if(!v.length)return;sel.innerHTML='';const en=v.filter(x=>x.lang.startsWith('en'));en.forEach((x,i)=>{const o=document.createElement('option');o.value=i;o.textContent=x.name+' ('+x.lang+')';if(x.name.includes('Google')&&x.lang==='en-IN')o.selected=true;sel.appendChild(o)});if(!sel.querySelector('[selected]')&&sel.options.length)sel.selectedIndex=0}
let _ka=null;function _startKA(){clearInterval(_ka);_ka=setInterval(()=>{if(window.speechSynthesis.speaking){window.speechSynthesis.pause();window.speechSynthesis.resume()}},5000)}function _stopKA(){clearInterval(_ka)}
function spk(t){if(!document.getElementById('vOn').checked)return;window.speechSynthesis.cancel();_stopKA();setTimeout(()=>{const u=new SpeechSynthesisUtterance(t);u.rate=parseFloat(document.getElementById('vSpd').value)||0.95;u.pitch=1;u.volume=0.9;const voices=window.speechSynthesis.getVoices().filter(x=>x.lang.startsWith('en'));const idx=parseInt(document.getElementById('vSel').value)||0;if(voices[idx]){u.voice=voices[idx];u.lang=voices[idx].lang}else{u.lang='en-IN'}u.onend=()=>_stopKA();window.speechSynthesis.speak(u);_startKA()},100)}
document.getElementById('vSpd').addEventListener('input',function(){document.getElementById('vSpdLbl').textContent=this.value})
function KP(d){return'<div class="kpi-s anim">'+d.map((x,i)=>'<div class="kpi anim anim-d'+(i+1)+'"><div class="kl">'+x[0]+'</div><div class="kv" style="'+(x[2]||'')+'">'+x[1]+'</div></div>').join('')+'</div>'}
function SB(a){return'<div class="sb"><div class="ss'+(a==='Breakout'?' ac':'')+'" style="width:22%;background:#00d991;opacity:'+(a==='Breakout'?1:.3)+'">Breakout</div><div class="ss'+(a==='VWAP'?' ac':'')+'" style="width:30%;background:#4f8dff;opacity:'+(a==='VWAP'?1:.3)+'">VWAP</div><div class="ss'+(a==='Dead'?' ac':'')+'" style="width:18%;background:#ffb300;opacity:'+(a==='Dead'?1:.3)+'">Dead Zone</div><div class="ss'+(a==='Power'?' ac':'')+'" style="width:30%;background:#ff3d5a;opacity:'+(a==='Power'?1:.3)+'">Power Hour</div></div>'}
function FL(s){return'<div style="display:flex;flex-direction:column;gap:4px;">'+s.map((x,i)=>'<div class="dbox '+(x[1]||'db-d')+' anim anim-d'+(i+1)+'">'+x[0]+'</div>'+(i<s.length-1?'<div class="arrow anim anim-d'+(i+1)+'">&#8595;</div>':'')).join('')+'</div>'}

const S=[
// 0: TITLE
{t:'',s:'intro',v:'Welcome to WealthLadder version 10. This demo walks you through everything, even if you have never traded before. 32 slides with voice narration and sound effects. Lets begin.',
h:'<div class="ti"><h1 class="anim">WEALTH<em>.</em>LADDER</h1><div class="tg anim anim-d2">CLIMB SMARTER &middot; TRADE BETTER</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px" class="anim anim-d3"><span class="chip cg">14,805 lines</span><span class="chip cb2">51 routes</span><span class="chip cr">218 functions</span><span class="chip co">12 pages</span></div><div class="anim anim-d4" style="font-size:14px;color:var(--muted);line-height:2"><strong style="color:var(--open)">Part 1:</strong> Stock market basics<br><strong style="color:var(--buy)">Part 2:</strong> App walkthrough<br><strong style="color:var(--accent)">Part 3:</strong> Advanced strategies<br><br>Click <strong style="color:var(--accent)">Next &rarr;</strong> to begin</div></div>'},

// 1: What is a stock?
{t:'',s:'chime',v:'Part 1. Stock market basics. What is a stock? A stock is a tiny piece of ownership in a company. When you buy 10 shares of Reliance at 1280 rupees each, you own a small part of Reliance Industries. If the company does well, share price goes up and you profit. If it does poorly, price goes down and you lose. Buying and selling stocks happens on a Stock Exchange like NSE.',
h:'<span class="part-tag pt-edu">Part 1 &mdash; Basics</span><div class="page-tag">What is a Stock?</div><div class="narr">A <strong>stock</strong> = tiny piece of ownership in a company. Price goes up if company does well.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"><div class="dbox db-g anim anim-d1"><div style="font-size:24px;margin-bottom:6px">&#127970;</div><strong>Reliance Industries</strong><br>1 share = &#8377;1,280</div><div class="dbox db-b anim anim-d2"><div style="font-size:24px;margin-bottom:6px">&#128100;</div><strong>You buy 10 shares</strong><br>Cost: &#8377;12,800</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;"><div class="dbox db-g anim anim-d3">&#128200; <strong>Company does well</strong><br>&#8377;1,280 &rarr; &#8377;1,400<br>Profit: <span style="color:var(--buy)">+&#8377;1,200</span></div><div class="dbox db-r anim anim-d4">&#128201; <strong>Company does badly</strong><br>&#8377;1,280 &rarr; &#8377;1,100<br>Loss: <span style="color:var(--sell)">&minus;&#8377;1,800</span></div></div>'},

// 2: Intraday trading
{t:'',s:'chime',v:'Intraday trading means you buy and sell the same stock on the same day. You make money from small price movements, like 1 percent. Buy TCS at 3800, sell at 3838, profit 38 rupees per share. Do this with 100 shares, that is 3800 rupees in one trade. WealthLadder is built for this. Start with cash, make trades, end with more cash. Every day.',
h:'<span class="part-tag pt-edu">Part 1</span><div class="page-tag">Intraday Trading</div><div class="narr">Buy AND sell the same day. Make money from small price movements (1%).</div>'+FL([['<strong>9:30 AM</strong> &mdash; BUY TCS at &#8377;3,800','db-b'],['<strong>Price rises 1%</strong> &mdash; &#8377;3,800 &rarr; &#8377;3,838','db-d'],['<strong>11:00 AM</strong> &mdash; SELL at &#8377;3,838 &mdash; Profit: <span style="color:var(--buy);font-weight:700">+&#8377;3,800</span> (100 shares)','db-g']])+'<div class="wn anim anim-d4">WealthLadder finds these opportunities automatically. You just click BUY.</div>'},

{t:'',s:null,v:'Futures and Options let you trade with less money. Instead of buying 65 Nifty shares for 15 lakh rupees, you pay just 1 to 2 lakh as margin. Options are even cheaper. A Nifty call option costs 500 to 3000 rupees and can give 2 to 10 times profit. CE means Call, you think price goes up. PE means Put, you think price goes down.',
h:'<span class="part-tag pt-edu">Part 1</span><div class="page-tag">Futures & Options (F&O)</div><div class="narr">Trade big positions with small money. Like renting instead of buying.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div class="dbox db-o anim anim-d1" style="text-align:left"><div style="font-size:20px;margin-bottom:6px">&#128203;</div><strong>Futures</strong><br>NIFTY 1 lot = 65 units<br>Value: &#8377;15.27L<br>Margin: <span style="color:var(--buy)">&#8377;1.90L only</span></div><div class="dbox db-g anim anim-d2" style="text-align:left"><div style="font-size:20px;margin-bottom:6px">&#127919;</div><strong>Options</strong><br>NIFTY 25000CE<br>Cost: &#8377;40 &times; 65 = <span style="color:var(--buy)">&#8377;2,600</span><br>If +200pts: <span style="color:var(--buy)">&#8377;13,000 (5&times;)</span></div></div><div class="ok anim anim-d3">CE = Call = price goes <span style="color:var(--buy)">UP</span> &nbsp;|&nbsp; PE = Put = price goes <span style="color:var(--sell)">DOWN</span></div>'},

// 4: NIFTY + Expiry
{t:'',s:null,v:'NIFTY 50 represents the 50 biggest Indian companies. Most traders trade NIFTY and SENSEX options. There are 2 expiry days every week. Tuesday for NIFTY on NSE. Thursday for SENSEX on BSE. Prices move extremely fast on both expiry days. A 10 rupee option can become 50 rupees in 30 minutes. WealthLadder works on BOTH expiry days, Tuesday and Thursday. Now you know enough. Lets see the app.',
h:'<span class="part-tag pt-edu">Part 1</span><div class="page-tag">NIFTY 50 + Expiry Day</div><div class="narr">NIFTY = top 50 companies. <strong>2 expiry days per week:</strong> Tuesday (NIFTY on NSE) + Thursday (SENSEX on BSE).</div>'+KP([['NIFTY 50','23,500','color:var(--accent);font-size:20px'],['Lot Size','65 (Jan 2026)',''],['NIFTY Expiry','Tuesday (NSE)',''],['SENSEX Expiry','Thursday (BSE)','']])+SB('Power')+'<div class="ok anim anim-d3">WealthLadder has a dedicated <strong>Expiry Day Station</strong> with 6 signal types + Focus Mode + Pyramid scaling. Works on BOTH Tuesday (NIFTY) and Thursday (SENSEX) expiry days.</div><div class="wn anim anim-d4">Now you know the basics. Let\'s see the actual app! &rarr;</div>'},

{t:'',s:'intro',v:'Part 2. Meet WealthLadder. One single Python file. 14,805 lines. Runs on your computer. Connects to Zerodha Kite, India\'s largest broker. Your money stays with Zerodha. The app just sends smart buy and sell commands. Think of it as a smart remote control for your trading account.',
h:'<span class="part-tag pt-app">Part 2 &mdash; The App</span><div class="page-tag">Meet WealthLadder</div><div class="narr">One file. Runs locally. Connects to <strong>Zerodha Kite</strong>. Your money stays with Zerodha.</div>'+KP([['Lines','14,805','color:var(--accent);font-size:20px'],['Routes','51',''],['Pages','12',''],['Functions','218',''],['Scanners','6','']])+'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px"><div class="dbox db-g anim anim-d1" style="font-size:10px;padding:10px">&#128269; Scanners<br>Find trades</div><div class="dbox db-b anim anim-d2" style="font-size:10px;padding:10px">&#9889; Scalp Station<br>Execute fast</div><div class="dbox db-o anim anim-d3" style="font-size:10px;padding:10px">&#127919; Expiry Day<br>Expiry 0DTE</div><div class="dbox db-g anim anim-d4" style="font-size:10px;padding:10px">&#128200; Wealth Ladder<br>Track growth</div></div>'},
