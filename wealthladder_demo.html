<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WealthLadder — Complete Demo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060810;--bg2:#0a0e1a;--bg3:#0f1422;--card:#111826;--border:rgba(255,255,255,.055);--buy:#00d991;--sell:#ff3d5a;--open:#ffb300;--accent:#4f8dff;--text:#d4dff7;--muted:#4a5670;--dim:#1e2a42;--mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:8px 24px;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg2);flex-shrink:0}
.brand{font-family:var(--mono);font-size:15px;font-weight:700}.brand em{color:var(--buy);font-style:normal}
.scr{flex:1;overflow-y:auto;padding:24px 32px}
.narr{background:var(--bg3);border:.5px solid rgba(79,141,255,.15);border-radius:10px;padding:14px 20px;margin-bottom:16px;font-size:14px;line-height:1.85;color:#85B7EB}
.kpi-s{display:flex;gap:0;border:.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.kpi{padding:10px 14px;border-right:.5px solid var(--border);flex:1}.kpi:last-child{border-right:none}
.kl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.kv{font-family:var(--mono);font-size:15px;font-weight:700}
.sig{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:12px 16px;margin:8px 0;animation:fu .5s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-flex;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600}
.bb{background:rgba(0,217,145,.12);color:var(--buy)}.bs{background:rgba(255,61,90,.12);color:var(--sell)}.bi{background:rgba(79,141,255,.12);color:var(--accent)}
.ba{background:rgba(0,217,145,.15);color:var(--buy);border:.5px solid rgba(0,217,145,.3)}.bf{background:rgba(255,61,90,.15);color:var(--sell);border:.5px solid rgba(255,61,90,.3)}
.bw{background:rgba(79,141,255,.12);color:#85B7EB;border:.5px solid rgba(79,141,255,.2)}.bc{background:rgba(255,255,255,.06);color:var(--muted);border:.5px solid rgba(255,255,255,.1)}
.mo{font-family:var(--mono);font-size:12px}
.pos{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg3);border-radius:8px;margin:6px 0;transition:all .4s}
.pos.fg{background:rgba(0,217,145,.1);box-shadow:0 0 12px rgba(0,217,145,.15)}.pos.fr{background:rgba(255,61,90,.1);box-shadow:0 0 12px rgba(255,61,90,.15)}
.bg{padding:5px 14px;border-radius:5px;border:none;background:var(--buy);color:#000;font-size:12px;font-weight:600;cursor:pointer}
.br{padding:5px 14px;border-radius:5px;border:none;background:var(--sell);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.bam{padding:5px 14px;border-radius:5px;border:none;background:var(--open);color:#000;font-size:12px;font-weight:600;cursor:pointer}
.sep{color:var(--muted);margin:0 4px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}.tbl th{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:7px 10px;text-align:left;border-bottom:1px solid var(--border);background:var(--card)}.tbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.02)}
.sb{display:flex;border-radius:6px;overflow:hidden;height:28px;margin-bottom:12px}.ss{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#000}.ss.ac{outline:2px solid #fff;outline-offset:-2px;z-index:1}
.gr{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}.gd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}.gp{background:var(--buy);color:#000}.gf{background:var(--sell);color:#fff}
.ok{background:rgba(0,217,145,.04);border:.5px solid rgba(0,217,145,.15);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--buy);margin-top:10px}
.wn{background:rgba(255,179,0,.05);border:.5px solid rgba(255,179,0,.18);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--open);margin-top:10px}
.dn{background:rgba(255,61,90,.05);border:.5px solid rgba(255,61,90,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--sell);margin-top:10px}
.lb{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.ctrls{display:flex;align-items:center;gap:10px;padding:12px 24px;border-top:1px solid rgba(255,255,255,.06);background:var(--bg2);flex-shrink:0}
.cb{padding:8px 18px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer}.cb:disabled{opacity:.3;cursor:not-allowed}
.cp{background:var(--dim);color:var(--text)}.cn{background:var(--accent);color:#fff}
.ti{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center}
.ti h1{font-size:38px;font-weight:700;letter-spacing:2px;margin-bottom:6px}.ti h1 em{color:var(--buy);font-style:normal}
.ti .tg{font-size:12px;color:var(--muted);letter-spacing:4px;margin-bottom:24px}
.chip{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:500;border:.5px solid}
.cg{background:rgba(0,217,145,.08);color:var(--buy);border-color:rgba(0,217,145,.2)}
.cb2{background:rgba(79,141,255,.08);color:var(--accent);border-color:rgba(79,141,255,.2)}
.cr{background:rgba(255,61,90,.08);color:var(--sell);border-color:rgba(255,61,90,.2)}
.co{background:rgba(255,179,0,.08);color:var(--open);border-color:rgba(255,179,0,.2)}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(0,217,145,.3)}50%{box-shadow:0 0 16px rgba(0,217,145,.7)}}.pls{animation:pulse 1.2s infinite}
@keyframes pulser{0%,100%{box-shadow:0 0 4px rgba(255,61,90,.3)}50%{box-shadow:0 0 16px rgba(255,61,90,.7)}}.plsr{animation:pulser 1.2s infinite}
.vt{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer}.vt input{accent-color:var(--buy)}
.page-tag{display:inline-flex;padding:2px 10px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.06em;background:rgba(79,141,255,.08);color:var(--accent);border:.5px solid rgba(79,141,255,.15);margin-bottom:10px}
</style>
</head>
<body>
<div class="app">
<div class="top">
  <div class="brand">WEALTH<em>.</em>LADDER <span style="font-size:10px;color:var(--muted);font-weight:400;margin-left:8px;">Complete Trading Day Demo</span></div>
  <div style="display:flex;align-items:center;gap:16px;">
    <label class="vt"><input type="checkbox" id="vOn" checked> Voice</label>
    <select id="vSel" style="background:var(--dim);color:var(--text);border:.5px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;font-family:var(--sans);max-width:200px;cursor:pointer"><option value="">Loading voices...</option></select>
    <label class="vt" style="gap:4px"><span style="font-size:10px">Speed</span><input type="range" id="vSpd" min="0.6" max="1.4" step="0.05" value="0.95" style="width:60px;accent-color:var(--buy)"><span id="vSpdLbl" style="font-size:10px;min-width:28px">0.95</span></label>
    <button onclick="spk('WealthLadder. Climb smarter, trade better.')" style="background:var(--dim);border:.5px solid var(--border);border-radius:4px;padding:3px 10px;font-size:10px;color:var(--accent);cursor:pointer;font-family:var(--sans)">Test</button>
    <span style="font-family:var(--mono);font-size:12px;color:var(--muted)" id="clk">09:15 IST</span>
  </div>
</div>
<div style="flex:1;overflow:hidden"><div class="scr" id="scr"></div></div>
<div class="ctrls">
  <div style="flex:1"></div>
  <span style="font-family:var(--mono);font-size:11px;color:var(--muted);min-width:60px;text-align:right" id="sl">1/25</span>
  <button class="cb cp" id="bp" onclick="P()">Prev</button>
  <button class="cb cn" id="bn" onclick="N()">Next</button>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
<script>
let aOk=false;async function aI(){if(aOk)return;try{await Tone.start();aOk=true}catch(e){}}
function sn(t){if(!aOk)return;try{
if(t==='scan')new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.05,decay:.3,sustain:0,release:.2},volume:-8}).toDestination().triggerAttackRelease('D5','8n');
if(t==='buy')['C5','E5','G5'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.15,sustain:0,release:.1}}).toDestination().triggerAttackRelease(n,'8n'),i*100));
if(t==='sell')['E4','C4'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.01,decay:.15,sustain:0,release:.1}}).toDestination().triggerAttackRelease(n,'8n'),i*120));
if(t==='alert')[0,150].forEach(d=>setTimeout(()=>new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.08,sustain:0,release:.05},volume:-12}).toDestination().triggerAttackRelease('A5','16n'),d));
if(t==='win')['C5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.2,sustain:.1,release:.2}}).toDestination().triggerAttackRelease(n,'8n'),i*120));
if(t==='gamma')['C5','E5','G5','B5','C6','E6'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.01,decay:.15,sustain:.15,release:.2}}).toDestination().triggerAttackRelease(n,'16n'),i*80));
if(t==='exit'){new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.01,decay:.15,sustain:0,release:.05},volume:-20}).toDestination().triggerAttackRelease('16n');setTimeout(()=>new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.01,decay:.3,sustain:0,release:.2}}).toDestination().triggerAttackRelease('G4','8n'),100)}
if(t==='blocked')['C4','C4','Ab3'].forEach((n,i)=>setTimeout(()=>new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.1,sustain:0,release:.05},volume:-15}).toDestination().triggerAttackRelease(n,'16n'),i*150));
}catch(e){}}
function _loadVoices(){
const sel=document.getElementById('vSel');const voices=window.speechSynthesis.getVoices();if(!voices.length)return;
sel.innerHTML='';
const en=voices.filter(v=>v.lang.startsWith('en'));
const other=voices.filter(v=>!v.lang.startsWith('en'));
en.forEach((v,i)=>{const o=document.createElement('option');o.value=i+'_en';o.textContent=v.name+' ('+v.lang+')';if(v.name.includes('Google')&&v.lang==='en-IN')o.selected=true;sel.appendChild(o)});
if(other.length){const g=document.createElement('optgroup');g.label='Other languages';other.forEach((v,i)=>{const o=document.createElement('option');o.value=i+'_ot';o.textContent=v.name+' ('+v.lang+')';g.appendChild(o)});sel.appendChild(g)}
if(!sel.querySelector('[selected]')&&sel.options.length)sel.selectedIndex=0}
function _getSelectedVoice(){
const sel=document.getElementById('vSel');if(!sel||!sel.value)return null;
const parts=sel.value.split('_');const idx=parseInt(parts[0]);const group=parts[1];
const voices=window.speechSynthesis.getVoices();
const en=voices.filter(v=>v.lang.startsWith('en'));
const other=voices.filter(v=>!v.lang.startsWith('en'));
return group==='en'?en[idx]:other[idx]}
document.getElementById('vSpd').addEventListener('input',function(){document.getElementById('vSpdLbl').textContent=this.value})
function spk(t){if(!document.getElementById('vOn').checked)return;window.speechSynthesis.cancel();_stopSpeechKeepAlive();setTimeout(()=>{const u=new SpeechSynthesisUtterance(t);u.rate=parseFloat(document.getElementById('vSpd').value)||0.95;u.pitch=1;u.volume=0.9;const v=_getSelectedVoice();if(v){u.voice=v;u.lang=v.lang}else{u.lang='en-IN'}u.onend=()=>_stopSpeechKeepAlive();u.onerror=()=>_stopSpeechKeepAlive();window.speechSynthesis.speak(u);_startSpeechKeepAlive()},100)}
function SB(a){return'<div class="sb"><div class="ss'+(a==='Breakout'?' ac':'')+'" style="width:22%;background:#00d991;opacity:'+(a==='Breakout'?1:.3)+'">Breakout</div><div class="ss'+(a==='VWAP'?' ac':'')+'" style="width:30%;background:#4f8dff;opacity:'+(a==='VWAP'?1:.3)+'">VWAP</div><div class="ss'+(a==='Dead Zone'?' ac':'')+'" style="width:18%;background:#ffb300;opacity:'+(a==='Dead Zone'?1:.3)+'">Dead Zone</div><div class="ss'+(a==='Power Hour'?' ac':'')+'" style="width:30%;background:#ff3d5a;opacity:'+(a==='Power Hour'?1:.3)+'">Power Hour</div></div>'}
function KP(d){return'<div class="kpi-s">'+d.map(x=>'<div class="kpi"><div class="kl">'+x[0]+'</div><div class="kv" style="'+(x[2]||'')+'">'+x[1]+'</div></div>').join('')+'</div>'}

const S=[
// 0 - TITLE
{t:'',s:null,v:'Welcome to WealthLadder. This is a complete animated walkthrough of your trading platform. 12,760 lines of code. 49 API routes. 12 pages. 6 scanners. Scalp Station. Expiry Day with 6 signal types. Goldilocks Zone. Wealth Ladder. All with voice narration and sound effects. Click Next to begin.',
h:'<div class="ti"><h1>WEALTH<em>.</em>LADDER</h1><div class="tg">CLIMB SMARTER, TRADE BETTER</div><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><span class="chip cg">6 scanners</span><span class="chip cb2">Scalp Station</span><span class="chip cr">Expiry Day 0DTE</span><span class="chip co">Goldilocks Zone</span><span class="chip cg">Wealth Ladder</span><span class="chip cb2">12,760 lines</span></div><div style="margin-top:28px;font-size:14px;color:var(--muted);line-height:1.9">25 steps &middot; Voice narration &middot; Sound effects<br>Click <strong style="color:var(--accent)">Next</strong> to begin</div></div>'},

// 1 - HOME PAGE
{t:'09:15',s:null,v:'Step 1. The app opens to the Home page. Your opening capital is 5 lakh rupees. Todays target is 1 percent, which equals 5,000 rupees. The Excess or Shortfall card will track your progress against this target all day long. Below you can see upcoming expiry dates with colour coded index badges.',
h:'<div class="page-tag">Home Page</div><div class="narr">Home page loads first. Shows opening capital, daily target (1% of opening), live P&L vs target, upcoming expiry dates.</div>'+KP([['Opening Capital','₹5,00,000','color:var(--accent)'],["Today's Target",'+₹5,000','color:var(--buy)'],["Today's P&L",'₹0',''],['Excess/Shortfall','−₹5,000','color:var(--sell)'],['Net Worth','₹5,00,000',''],['Reach Target By','Dec 2029','color:var(--open)']])+'<div class="lb">Upcoming 0DTE expiry dates</div><div class="sig" style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--open)"></span><span style="font-weight:600">Thu 3 Apr</span><span class="sep">|</span><span class="badge co" style="font-size:10px">NIFTY</span><span class="badge cr" style="font-size:10px">BANKNIFTY</span><span style="font-size:11px;color:var(--muted);margin-left:auto">5 days</span></div><div class="sig" style="display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></span><span style="font-weight:600">Tue 8 Apr</span><span class="sep">|</span><span class="badge cb2" style="font-size:10px">FINNIFTY</span><span style="font-size:11px;color:var(--muted);margin-left:auto">10 days</span></div>'},

// 2 - LOGIN
{t:'09:15',s:null,v:'Step 2. Login page. You paste the Kite Connect request token. The app validates it with Zerodha, gets your access token, and auto starts the WebSocket connection for real-time data streaming. 3 layer security protects the app. Machine locked license. Startup password. Encrypted API keys.',
h:'<div class="page-tag">Login Page</div><div class="narr">Paste Kite request token. App validates with Zerodha, stores encrypted access token, auto-starts WebSocket.</div><div class="sig" style="border-left:3px solid var(--buy)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:10px;height:10px;border-radius:50%;background:var(--buy);box-shadow:0 0 6px var(--buy)"></span><span style="font-weight:600;font-size:14px">Connected</span><span class="mo" style="color:var(--muted)">Welcome MasTec!</span></div><div style="font-size:12px;color:var(--muted)">Session valid until midnight &middot; WebSocket: 180 instruments subscribed</div></div><div class="lb" style="margin-top:14px">3-layer security</div><div class="sig"><div style="display:flex;gap:16px;font-size:12px"><span style="color:var(--accent)">1. Machine-locked license (SHA-256)</span><span class="sep">|</span><span style="color:var(--open)">2. Startup password (PBKDF2 150K)</span><span class="sep">|</span><span style="color:var(--buy)">3. Encrypted API keys (XOR+PBKDF2)</span></div></div>'},

// 3 - SCANNER RESULTS
{t:'09:16',s:'scan',v:'Step 3. Market opens at 9:15. The Open equals High Low scanner fetches live quotes for 180 F and O stocks through the centralized quote cache. Only 1 or 2 API calls for all 180 stocks. Finds stocks where Open equals High meaning sellers defending, or Open equals Low meaning buyers defending.',
h:'<div class="page-tag">Open=H/L Scanner</div><div class="narr">Scanner fetches 180 stocks via cached_quote(). 1-2 API calls. Finds Open=High (SELL) or Open=Low (BUY).</div><table class="tbl"><thead><tr><th>Symbol</th><th>Signal</th><th>LTP</th><th>Change</th><th>Volume</th><th></th></tr></thead><tbody><tr><td style="font-weight:600">TATAMOTORS</td><td><span class="badge bb">▲ BUY</span></td><td class="mo">₹782.40</td><td style="color:var(--buy)">+1.2%</td><td class="mo">2.4M</td><td><span class="bg" style="font-size:10px">BUY</span></td></tr><tr><td style="font-weight:600">SBIN</td><td><span class="badge bb">▲ BUY</span></td><td class="mo">₹812.15</td><td style="color:var(--buy)">+0.8%</td><td class="mo">1.8M</td><td><span class="bg" style="font-size:10px">BUY</span></td></tr><tr><td style="font-weight:600">HCLTECH</td><td><span class="badge bs">▼ SELL</span></td><td class="mo">₹1,642</td><td style="color:var(--sell)">−0.6%</td><td class="mo">890K</td><td><span class="br" style="font-size:10px">SELL</span></td></tr></tbody></table>'},

// 4 - PLACE ORDER
{t:'09:16',s:'buy',v:'Step 4. You click BUY on Tata Motors. The button instantly disables and shows Placing to prevent double click. A Limit order goes to Kite as MIS. Stop Loss Market order auto places at 0.5 percent below entry. Quantity is auto calculated. Risk per trade is 500 rupees.',
h:'<div class="page-tag">Order Placed</div><div class="narr">BUY clicked → button disabled ("Placing...") → LIMIT order to Kite → SL-M auto-placed → qty from Risk/Trade.</div><div class="sig" style="border-left:3px solid var(--buy)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-weight:600;font-size:15px">TATAMOTORS</span><span class="badge bb">▲ BUY</span><span class="mo" style="color:var(--muted)">12 qty @ ₹782.40</span></div><div style="display:flex;gap:16px;font-size:12px"><span style="color:var(--buy)">Target: ₹790.22 (+1%)</span><span style="color:var(--sell)">SL: ₹778.49 (−0.5%)</span><span style="color:var(--open)">SL-M auto-placed ✓</span></div><div style="font-size:11px;color:var(--muted);margin-top:6px">Scanner: Open=H/L | Risk: ₹500/trade | Order ID: 240329000142</div></div><div class="ok">Double-click safety: UI disable + server dedup + position verify</div>'},

// 5 - SCALP STATION
{t:'09:20',s:'scan',v:'Step 5. Scalp Station. This runs 3 strategies simultaneously. Strategy 1: Open equals High Low signals. Strategy 2: Volume Spike plus Breakout signals. Strategy 3: Nifty CE and PE options from the Black Scholes scanner. All signals are merged and sorted by confidence percentage.',
h:'<div class="page-tag">Scalp Station — Signal Queue</div><div class="narr">3 strategies merged, sorted by confidence. Eq/F&O toggle filters by mode.</div><div style="display:flex;gap:0;margin-bottom:10px"><span style="padding:5px 14px;border-radius:5px 0 0 5px;background:var(--dim);color:var(--muted);font-size:11px;font-weight:600">Equity</span><span style="padding:5px 14px;border-radius:0 5px 5px 0;background:var(--open);color:#000;font-size:11px;font-weight:600">F&O</span></div><div class="sig" style="border-left:3px solid var(--buy)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:10px;color:var(--muted);font-weight:600">OPEN=H/L</span><span style="font-weight:600">RELIANCE</span><span class="badge bb">BUY</span><span class="mo" style="margin-left:auto;color:var(--buy)">82%</span></div><div style="font-size:11px;color:var(--muted)">Open=Low confirmed | Vol 4.2M | +1.4% momentum</div><div style="display:flex;gap:6px;margin-top:8px"><span class="bg" style="font-size:11px">✓ Approve</span><span class="br" style="font-size:11px">✗ Skip</span><span class="bam" style="font-size:11px">⚡ Load</span></div></div><div class="sig" style="border-left:3px solid var(--accent)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:10px;color:var(--muted);font-weight:600">NIFTY CE — Option C</span><span style="font-weight:600">NIFTY 25200CE</span><span class="badge bb">BUY</span><span class="mo" style="margin-left:auto;color:var(--open)">68%</span></div><div style="font-size:11px;color:var(--muted)">PCR 0.62 bullish | IV Rank 42% | Max Pain 25100 | Spread 0.8%</div><div style="display:flex;gap:6px;margin-top:8px"><span class="bg" style="font-size:11px">✓ Approve</span><span class="br" style="font-size:11px">✗ Skip</span><span class="bam" style="font-size:11px">⚡ Load</span></div></div>'},

// 6 - APPROVE = ALERT
{t:'09:21',s:'alert',v:'Step 6. Important. Approve does NOT place an order. It sets a price alert. The background watcher thread polls LTP every 700 milliseconds. Only when LTP crosses the alert price, the order fires automatically. Quantity is auto calculated from Capital divided by LTP, or you can override it manually.',
h:'<div class="page-tag">Scalp Station — Alert Workflow</div><div class="narr">Approve = set PRICE ALERT. Order fires ONLY when LTP crosses alert price. Qty = Capital / LTP (editable).</div><div class="sig" style="background:rgba(0,217,145,.04);border:1px solid rgba(0,217,145,.2)"><div style="display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:50%;background:var(--buy);box-shadow:0 0 6px var(--buy)"></span><span style="font-weight:600;font-size:14px">RELIANCE</span><span class="badge bb">ALERT TRIGGERED</span><span class="mo" style="margin-left:auto;font-size:14px">₹2,950.25</span></div><div style="font-size:12px;color:var(--buy);margin-top:6px">Auto BUY fired: 16 qty @ ₹2,950 LIMIT MIS | SL-M @ ₹2,935</div></div><div class="wn">Qty decision chain: You set Capital → scCalcQty() computes qty = Capital/LTP → stored in alert → auto-fired when triggered. F&O mode: Lots × LotSize.</div>'},

// 7 - LIVE POSITIONS GROUPED
{t:'09:31',s:null,v:'Step 7. Dashboard shows live positions grouped by strategy. Strategy header rows show combined P and L. LTP updates every 5 seconds through the centralized quote cache. Green row tint when near target. Red tint when near stop loss.',
h:'<div class="page-tag">Dashboard — Live Positions</div><div class="narr">Positions grouped by strategy. Real-time P&L via cached_quote(). Strategy headers show combined P&L.</div><div class="lb">Open=H/L — 2 positions — <span style="color:var(--buy)">+₹1,140</span></div><div class="pos"><span style="font-weight:600;width:110px">TATAMOTORS</span><span class="badge bb" style="font-size:10px">BUY</span><span class="mo" style="color:var(--muted)">12 @ ₹782</span><span class="mo" style="color:var(--buy)">₹786.90</span><span class="mo" style="color:var(--buy)">Tgt ₹790</span><span class="mo" style="color:var(--sell)">SL ₹778</span><span class="mo" style="color:var(--buy);margin-left:auto;font-weight:600">+₹540</span><span class="br" style="font-size:10px;padding:3px 8px">Exit</span></div><div class="pos"><span style="font-weight:600;width:110px">RELIANCE</span><span class="badge bb" style="font-size:10px">BUY</span><span class="mo" style="color:var(--muted)">16 @ ₹2,950</span><span class="mo" style="color:var(--buy)">₹2,965</span><span class="mo" style="color:var(--buy)">Tgt ₹2,980</span><span class="mo" style="color:var(--sell)">SL ₹2,935</span><span class="mo" style="color:var(--buy);margin-left:auto;font-weight:600">+₹600</span><span class="br" style="font-size:10px;padding:3px 8px">Exit</span></div>'},

// 8 - TARGET HIT
{t:'09:38',s:'win',v:'Step 8. Target hit on Tata Motors! LTP crosses 790.22. The row glows green. The Sell button starts pulsing with a green glow animation. A badge shows Target Hit. This happens in real time through the LTP updater that checks target and stop loss on every price tick.',
h:'<div class="page-tag">Dashboard — Target Hit</div><div class="narr">TARGET HIT! Row glows green. SELL button pulses. Badge: "✓ HIT". LTP updater checks target/SL on every tick.</div><div class="pos fg"><span style="font-weight:600;width:110px">TATAMOTORS</span><span class="badge bb" style="font-size:10px">BUY</span><span class="mo" style="color:var(--muted)">12 @ ₹782.40</span><span class="mo" style="font-size:16px;font-weight:600;color:var(--buy)">₹790.85</span><span style="font-size:10px;background:rgba(0,217,145,.15);color:var(--buy);padding:2px 8px;border-radius:4px">✓ TARGET HIT</span><span class="mo" style="color:var(--buy);font-weight:600;font-size:15px;margin-left:auto">+₹1,014</span><span class="br pls" style="font-size:11px">▼ SELL</span></div><div style="font-size:12px;color:var(--buy);margin-top:8px">If SL hits instead → row glows red, SELL button pulses red, badge shows "⚠ HIT"</div>'},

// 9 - EXIT
{t:'09:38',s:'sell',v:'Step 9. You click the pulsing Sell button. It disables instantly showing Exiting. A Limit Sell order goes to Kite. The Stop Loss Market order is auto cancelled so theres no ghost position. P and L is locked at plus 1,014 rupees and logged with the scanner tag.',
h:'<div class="page-tag">Exit Order</div><div class="narr">SELL clicked → button disabled → LIMIT SELL to Kite → SL-M auto-cancelled → P&L locked → logged.</div><div class="sig" style="border-left:3px solid var(--sell)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-weight:600;font-size:15px">TATAMOTORS</span><span class="badge bs">SOLD (Exit)</span><span class="mo" style="color:var(--buy);margin-left:auto;font-size:16px;font-weight:600">+₹1,014</span></div><div style="font-size:12px;color:var(--muted)">12 qty | ₹782.40 → ₹790.85 | 22 min hold | Scanner: Open=H/L</div><div style="font-size:11px;color:var(--open);margin-top:4px">SL-M order auto-cancelled ✓ | cancel_sl_for_symbol() runs on every exit</div></div>'},

// 10 - ALL SCANNERS
{t:'10:30',s:'scan',v:'Step 10. Five more scanners run throughout the day. Volume Spike detects 4 times average volume with momentum. PDH PDL Breakout finds stocks breaking previous day high or low. RSI Reversal catches oversold or overbought. VWAP Cross detects trend changes. Gap finds opening gaps above 1 percent. All use one unified API route.',
h:'<div class="page-tag">Scanners (5 additional)</div><div class="narr">5 scanners via unified /api/scan/&lt;strategy&gt; route. All feed into Scalp Station signal queue.</div><table class="tbl"><thead><tr><th>Scanner</th><th>Trigger</th><th>Best Time</th><th>Signal</th></tr></thead><tbody><tr><td style="font-weight:600">Volume Spike</td><td>Volume 4× average + momentum</td><td>All day</td><td>Direction of spike</td></tr><tr><td style="font-weight:600">PDH/PDL Breakout</td><td>LTP breaks prev day high/low</td><td>9:30 – 11:00</td><td>BUY above PDH, SELL below</td></tr><tr><td style="font-weight:600">RSI Reversal</td><td>RSI < 25 or > 75</td><td>All day</td><td>BUY oversold, SELL overbought</td></tr><tr><td style="font-weight:600">VWAP Cross</td><td>LTP crosses VWAP + volume</td><td>10:00+</td><td>BUY above, SELL below</td></tr><tr><td style="font-weight:600">Gap Up/Down</td><td>Open gaps 1%+ from prev close</td><td>9:15 – 9:20</td><td>Fade or follow the gap</td></tr></tbody></table>'},

// 11 - EXPIRY BREAKOUT
{t:'09:16',s:'scan',v:'Step 11. Expiry Day Station. Thursday market open. Breakout session runs from 9:15 to 10:30. High gamma, range expansion expected. Signal 0DTE-B fires when price is near the day high with volume confirmation. This is a directional gamma play.',
h:'<div class="page-tag">Expiry Day — Breakout Session</div><div class="narr">Breakout session 9:15-10:30. High gamma. 0DTE-B signal fires near day high with volume.</div>'+SB('Breakout')+KP([['NIFTY','25,180',''],['PCR','0.82','color:var(--open)'],['Max Pain','25,100',''],['CE Wall','25,300','color:var(--sell)'],['PE Wall','25,000','color:var(--buy)']])+'<div class="sig" style="border-left:3px solid var(--buy)"><div style="display:flex;align-items:center;gap:6px"><span class="badge bw">GRADE B</span><span style="font-weight:600">0DTE-B</span><span class="badge bb">LONG CE</span><span class="mo" style="margin-left:auto;color:var(--buy)">72%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">Breakout zone. Price near day high. Gamma CE long if closes above with volume.</div></div>'},

// 12 - SFP SIGNALS
{t:'09:48',s:'alert',v:'Step 12. PCR drops to 0.58. Extreme greed. Signal SFP-B fires. Swing Failure Pattern Bearish. When PCR is below 0.6, market is overbought and a reversal is likely. Grade A if PCR below 0.5. The opposite is SFP-L when PCR is above 1.5 meaning extreme fear and a bounce is coming.',
h:'<div class="page-tag">Expiry Day — SFP Signals</div><div class="narr">PCR-based reversal signals. SFP-B on extreme greed (PCR < 0.6). SFP-L on extreme fear (PCR > 1.5).</div>'+SB('Breakout')+'<div class="sig" style="border-left:3px solid var(--sell)"><div style="display:flex;align-items:center;gap:6px"><span class="badge ba" style="background:rgba(255,61,90,.12);color:var(--sell);border-color:rgba(255,61,90,.3)">GRADE A</span><span style="font-weight:600">SFP-B</span><span class="badge bs">SHORT CE</span><span class="mo" style="margin-left:auto;color:var(--sell)">88%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">PCR 0.58 — extreme greed. Market overbought. SHORT via ATM+1 CE.</div></div><div class="sig" style="border-left:3px solid var(--buy);opacity:.6"><div style="display:flex;align-items:center;gap:6px"><span class="badge ba">GRADE A</span><span style="font-weight:600">SFP-L</span><span class="badge bb">LONG PE</span><span class="mo" style="margin-left:auto;color:var(--buy)">85%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">Fires when PCR > 1.5. Extreme fear = short-covering rally likely.</div></div>'},

// 13 - VWAP-R + OB-T
{t:'10:42',s:'scan',v:'Step 13. VWAP session, 10:30 to 1 PM. Signal VWAP-R fires when Nifty hits the VWAP plus 2 sigma band. Mean reversion trade, short to target VWAP. Simultaneously, OB-T fires because spot is within 2 strikes of the CE OI wall at 25,300. These signals can stack.',
h:'<div class="page-tag">Expiry Day — VWAP + OI Wall Signals</div><div class="narr">VWAP session. VWAP-R at ±2 sigma. OB-T near OI walls. Both can fire simultaneously.</div>'+SB('VWAP')+KP([['Spot','25,280','color:var(--sell)'],['VWAP','25,190',''],['VWAP +2σ','25,278','color:var(--sell)'],['CE Wall','25,300','color:var(--sell)']])+'<div class="sig" style="border-left:3px solid var(--accent)"><div style="display:flex;align-items:center;gap:6px"><span class="badge ba">A</span><span style="font-weight:600">VWAP-R</span><span class="badge bs">SHORT</span><span class="mo" style="margin-left:auto">80%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">NIFTY at VWAP +2σ (25,278). Mean reversion SHORT. Target: VWAP 25,190.</div></div><div class="sig" style="border-left:3px solid var(--open)"><div style="display:flex;align-items:center;gap:6px"><span class="badge bw">B</span><span style="font-weight:600">OB-T</span><span class="badge bs">SHORT</span><span class="mo" style="margin-left:auto">76%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">Spot approaching CE Wall at 25,300. OI wall = resistance.</div></div>'},

// 14 - DEAD ZONE + IDC
{t:'13:15',s:null,v:'Step 14. Dead Zone, 1 PM to 2 PM. Low volume consolidation. Only IDC signal fires here. IDC means Inter Day Convergence, where price drifts toward Max Pain. Small position sizes recommended. The real action comes in Power Hour.',
h:'<div class="page-tag">Expiry Day — Dead Zone</div><div class="narr">Dead Zone 13:00-14:00. Low volume. Only IDC (Max Pain drift) signal active. Wait for Power Hour.</div>'+SB('Dead Zone')+KP([['Spot','25,150',''],['Max Pain','25,100','color:var(--open)'],['Distance','50 pts',''],['Session','DEAD ZONE','color:var(--open)']])+'<div class="sig" style="border-left:3px solid var(--open);opacity:.8"><div style="display:flex;align-items:center;gap:6px"><span class="badge bw">B</span><span style="font-weight:600">IDC</span><span class="badge bs">SHORT</span><span class="mo" style="margin-left:auto">75%</span></div><div style="font-size:11px;color:var(--muted);margin-top:4px">Max Pain pinning at 25,100. Spot 25,150 drifts down. Dead Zone = small size only.</div></div><div class="wn">Dead Zone warning: Low volume consolidation. Avoid large positions. Wait for Power Hour at 14:00.</div>'},

// 15 - ALL 6 SIGNALS TABLE
{t:'14:00',s:null,v:'Step 15. Here are all 6 expiry day signal types. S F P Bearish on extreme greed. S F P Long on extreme fear. O B T near OI walls. VWAP-R at sigma bands. IDC for max pain drift. Zero DTE B for breakout. Each fires in specific sessions based on market conditions.',
h:'<div class="page-tag">Expiry Day — All 6 Signal Types</div><div class="narr">Complete reference. Each signal has specific triggers and session windows.</div><table class="tbl"><thead><tr><th>Signal</th><th>Trigger</th><th>Session</th><th>Direction</th></tr></thead><tbody><tr><td style="font-weight:600">0DTE-B</td><td>Price near day high + volume</td><td style="color:var(--buy)">Breakout only</td><td><span class="badge bb">LONG CE</span></td></tr><tr><td style="font-weight:600">SFP-B</td><td>PCR < 0.6 (extreme greed)</td><td>Any session</td><td><span class="badge bs">SHORT CE</span></td></tr><tr><td style="font-weight:600">SFP-L</td><td>PCR > 1.5 (extreme fear)</td><td>Any session</td><td><span class="badge bb">LONG PE</span></td></tr><tr><td style="font-weight:600">OB-T</td><td>Spot within 2 strikes of OI wall</td><td>Any session</td><td>SHORT near CE / LONG near PE</td></tr><tr><td style="font-weight:600">VWAP-R</td><td>Spot at VWAP ±2 sigma</td><td style="color:var(--accent)">VWAP + Power Hour</td><td>Mean reversion</td></tr><tr><td style="font-weight:600">IDC</td><td>Spot within 3 strikes of Max Pain</td><td style="color:var(--sell)">Dead + Power</td><td>Drift toward MP</td></tr></tbody></table>'},

// 16 - GOLDILOCKS 5 CHECK
{t:'14:05',s:'scan',v:'Step 16. Power Hour begins. The Goldilocks 5 check system activates automatically. It uses live 1 minute candle data from Kite historical API. Check 1: did NIFTY trade in a tight box between 1:30 and 2 PM? Check 2: did volume dry up in the second half? Check 3: did a displacement candle break the box? Check 4: are Reliance and HDFC Bank green and above their VWAP? Check 5: does a fair value gap exist?',
h:'<div class="page-tag">Goldilocks Zone — 5-Check System</div><div class="narr">Power Hour (14:00-15:15). Goldilocks checks run automatically using live 1-min Kite historical data.</div>'+SB('Power Hour')+'<div style="background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:14px 18px"><div class="gr"><div class="gd gp">1</div><span style="font-weight:600">Box formed</span><span class="sep">—</span><span style="color:var(--muted);font-size:12px">13:30-14:00 range 0.18% (< 0.3% threshold)</span></div><div class="gr"><div class="gd gp">2</div><span style="font-weight:600">Volume dried up</span><span class="sep">—</span><span style="color:var(--muted);font-size:12px">2nd half vol −38% vs 1st half (> 25% drop)</span></div><div class="gr"><div class="gd gp">3</div><span style="font-weight:600">Displacement candle</span><span class="sep">—</span><span style="color:var(--muted);font-size:12px">14:03 candle closed outside box, 2.1× morning volume</span></div><div class="gr"><div class="gd gp">4</div><span style="font-weight:600">Heavyweights confirm</span><span class="sep">—</span><span style="color:var(--muted);font-size:12px">RIL +0.8% above VWAP | HDFC +0.5% above VWAP</span></div><div class="gr"><div class="gd gf">5</div><span style="font-weight:600">FVG exists</span><span class="sep">—</span><span style="color:var(--sell);font-size:12px">No 3-candle gap found (gap < 2 pts)</span></div><div style="margin-top:12px;display:flex;align-items:center;gap:10px"><span style="font-size:14px;font-weight:600">4/5 passed</span><span class="badge ba">GRADE A</span><span style="font-size:14px;font-weight:600;color:var(--buy)">GAMMA BLAST MODE</span></div></div>'},

// 17 - GAMMA BLAST
{t:'14:08',s:'gamma',v:'Step 17. Grade A confirmed. Gamma Blast signal fires! This is the key point: Gamma Blast is mutually exclusive with regular Power Hour signals. When Goldilocks triggers with 4 or more checks, IDC, VWAP-R, and OB-T signals are completely suppressed. Only the gamma trade runs. It targets a cheap OTM option at 8 rupees 50 premium for a potential 5 to 10 x move. Pyramid scaling with seed, add, and boost lots.',
h:'<div class="page-tag">GAMMA BLAST — Mutually Exclusive</div><div class="narr">Grade A (4/5). GAMMA BLAST fires. MUTUALLY EXCLUSIVE — suppresses IDC, VWAP-R, OB-T. Only gamma trade runs.</div><div class="sig" style="border:1px solid rgba(0,217,145,.3);background:rgba(0,217,145,.03)"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span class="badge ba">GRADE A</span><span style="font-weight:600;font-size:16px">GAMMA BLAST</span><span class="badge bb">BUY CE</span><span class="mo" style="margin-left:auto;color:var(--buy);font-size:16px">92%</span></div><div style="font-size:13px">NIFTY 25300CE @ ₹8.50 | OTM strike | Pyramid entry: 1X seed</div><div style="margin-top:8px;display:flex;gap:12px;font-size:12px"><span style="color:var(--buy)">Seed: 1 lot @ ₹8.50</span><span style="color:var(--open)">Add: 2X @ ₹18</span><span style="color:var(--open)">Boost: 3X @ ₹30+</span></div></div><div class="wn">If Goldilocks fails (< 4 checks), IDC / VWAP-R / OB-T fire as FALLBACK instead. No gamma trade.</div>'},

// 18 - FALLBACK (no gamma)
{t:'14:12',s:null,v:'Step 18. What happens when Goldilocks fails. Here only 2 out of 5 checks passed. Grade C. No gamma blast. Instead, regular power hour signals fire as fallback. IDC for max pain pinning. VWAP-R for band rejection. OB-T for OI wall approach. These are smaller, lower conviction trades.',
h:'<div class="page-tag">Goldilocks FAILS — Fallback Signals</div><div class="narr">When < 4 checks pass, no Gamma Blast. Regular Power Hour signals fire as fallback instead.</div><div style="background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:10px"><div class="gr"><div class="gd gp">1</div><span>Box formed</span></div><div class="gr"><div class="gd gp">2</div><span>Volume dried up</span></div><div class="gr"><div class="gd gf">3</div><span style="color:var(--sell)">No displacement</span></div><div class="gr"><div class="gd gf">4</div><span style="color:var(--sell)">HDFC below VWAP</span></div><div class="gr"><div class="gd gf">5</div><span style="color:var(--sell)">No FVG</span></div><div style="margin-top:6px"><span class="badge bc">2/5 GRADE C</span> <span style="color:var(--muted);margin-left:4px;font-size:12px">Fallback to regular signals</span></div></div><div class="lb">Fallback signals (fire INSTEAD of Gamma Blast):</div><div class="sig" style="border-left:3px solid var(--open)"><div style="display:flex;align-items:center;gap:6px"><span class="badge bw">B</span><span style="font-weight:600">IDC</span> Max Pain pin <span class="mo" style="margin-left:auto">75%</span></div></div><div class="sig" style="border-left:3px solid var(--accent)"><div style="display:flex;align-items:center;gap:6px"><span class="badge ba">A</span><span style="font-weight:600">VWAP-R</span> VWAP snap <span class="mo" style="margin-left:auto">80%</span></div></div><div class="sig" style="border-left:3px solid var(--sell)"><div style="display:flex;align-items:center;gap:6px"><span class="badge bw">B</span><span style="font-weight:600">OB-T</span> OI wall <span class="mo" style="margin-left:auto">76%</span></div></div>'},

// 19 - GAMMA CAPTURED
{t:'14:42',s:'win',v:'Step 19. Nifty rallied 80 points in 37 minutes. The 25300 CE moved from 8 rupees 50 to 42 rupees. Thats a 5 x move! Pyramid scaling added 2 more lots during the move. Seed at 8.50, add at 18, exit all at 42. Total P and L plus 5,025 rupees from one trade.',
h:'<div class="page-tag">GAMMA BLAST — 5× Move Captured</div><div class="narr">NIFTY rallied 80 pts. CE: ₹8.50 → ₹42 (5×). Pyramid added 2 lots. +₹5,025.</div><div class="pos fg"><span style="font-weight:600;width:130px">NIFTY 25300CE</span><span class="badge bb" style="font-size:10px">BUY</span><span class="mo" style="color:var(--muted)">3 lots (150 qty)</span><span class="mo" style="font-size:18px;font-weight:600;color:var(--buy)">₹42.00</span><span class="mo" style="color:var(--buy);font-weight:600;font-size:18px;margin-left:auto">+₹5,025</span></div><div style="margin-top:8px;display:flex;gap:8px;font-size:12px"><span style="color:var(--buy)">Seed: 1 lot @ ₹8.50</span><span class="sep">|</span><span style="color:var(--open)">Add: 2× @ ₹18</span><span class="sep">|</span><span style="color:var(--buy)">Exit all @ ₹42</span></div>'},

// 20 - RISK BLOCK
{t:'14:50',s:'blocked',v:'Step 20. Risk management in action. After 3 losing trades, total day loss hits 5,000 rupees. The daily loss limit circuit breaker triggers. All buy and sell buttons are disabled across every page. Scanner, Scalp, F&O, Expiry Day. You can only exit existing positions. No new orders until tomorrow. The limit is configurable from Settings.',
